<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tab Map</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f13;
      --surface: rgba(18,22,30,0.96);
      --border:  rgba(255,255,255,0.08);
      --text:    #d8e0ed;
      --muted:   rgba(180,195,220,0.45);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #panel {
      position: absolute;
      top: 16px; left: 16px;
      width: 260px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      backdrop-filter: blur(16px);
      overflow: hidden;
      transition: height .25s cubic-bezier(.4,0,.2,1);
      z-index: 10;
    }

    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }
    #panel-header:hover { background: rgba(255,255,255,0.03); }

    .title {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 500;
      letter-spacing: .8px; text-transform: uppercase;
      color: var(--muted);
    }

    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #39e87a; box-shadow: 0 0 5px #39e87a;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .chevron {
      font-size: 13px; color: var(--muted);
      transition: transform .25s; line-height: 1;
    }
    #panel.collapsed .chevron { transform: rotate(180deg); }

    #tab-list { padding: 8px; display: flex; flex-direction: column; gap: 4px; }

    .tab-row {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid transparent;
      font-size: 10px; line-height: 1.65;
      transition: border-color .15s, background .15s;
    }
    .tab-row:hover      { background: rgba(255,255,255,0.04); border-color: var(--border); }
    .tab-row.is-me      { border-color: rgba(74,158,255,.25); background: rgba(74,158,255,.05); }
    .tab-row.is-focused { border-color: rgba(255,255,255,.15); background: rgba(255,255,255,.04); }

    .tab-row-head { display: flex; align-items: center; gap: 7px; margin-bottom: 4px; }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    .tab-name { font-size: 11px; font-weight: 500; }
    .tab-meta { color: var(--muted); }

    #panel-footer {
      padding: 8px 12px 10px;
      border-top: 1px solid var(--border);
      font-size: 10px; color: var(--muted);
    }
    #panel-footer b { color: var(--text); font-weight: 500; }

    #hint {
      position: absolute; bottom: 16px; right: 16px;
      font-size: 10px; color: var(--muted);
      line-height: 2; text-align: right;
      pointer-events: none;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<canvas id="canvas"></canvas>

<div id="panel">
  <div id="panel-header" onclick="togglePanel()">
    <div class="title"><span class="live-dot"></span>Tab Map</div>
    <span class="chevron">▾</span>
  </div>
  <div id="panel-body">
    <div id="tab-list"></div>
    <div id="panel-footer">
      <b id="count">1</b> tab(s) &nbsp;·&nbsp; updated <b id="ts">—</b>
    </div>
  </div>
</div>

<div id="hint">
  Open in multiple windows &amp; move them<br>
  to see live connections
</div>

<script>
const COLORS = ['#4a9eff','#39e87a','#f5c542','#b56aff','#ff6b6b','#00d4ff','#ff9f43'];
const CHANNEL = 'tab-map-v2';
const STALE_MS = 3000;
const TICK_MS  = 500;
const PAD = 80;
const TAU = Math.PI * 2;

// ── Panel collapse ────────────────────────────────────────────────────────
const panel = document.getElementById('panel');
let collapsed = false;

function togglePanel() {
  collapsed = !collapsed;
  panel.classList.toggle('collapsed', collapsed);
  panel.style.height = collapsed
    ? document.getElementById('panel-header').offsetHeight + 'px'
    : '';
}

// ── Helpers ───────────────────────────────────────────────────────────────
function rgba(hex, a) {
  const [r, g, b] = [1, 3, 5].map(i => parseInt(hex.slice(i, i + 2), 16));
  return `rgba(${r},${g},${b},${a})`;
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x,     y,     x + r, y,             r);
  ctx.closePath();
}

// ── TabTracker ────────────────────────────────────────────────────────────
class TabTracker {
  constructor() {
    this.id       = crypto.randomUUID();
    this.tabs     = {};
    this.colorMap = { [this.id]: 0 };
    this.colorSeq = 1;
    this.focusedId = this.id;   // shared across all tabs: who is currently focused
    this.ch = new BroadcastChannel(CHANNEL);

    this.ch.onmessage = ({ data: { type, id, state } }) => {
      if (type === 'update') {
        this.tabs[id] = state;
        if (!(id in this.colorMap)) this.colorMap[id] = this.colorSeq++;
      }
      if (type === 'remove') {
        delete this.tabs[id];
        if (this.focusedId === id) this.focusedId = this.id;
      }
      if (type === 'focus')  this.focusedId = id;
      if (type === 'sync')   { this.publish(); this.broadcastFocus(); }
      this.draw();
    };

    window.addEventListener('beforeunload', () =>
      this.ch.postMessage({ type: 'remove', id: this.id }));

    window.addEventListener('focus', () => {
      this.focusedId = this.id;
      this.broadcastFocus();
      this.publish();
    }, { passive: true });

    ['resize', 'blur', 'mousemove'].forEach(ev =>
      window.addEventListener(ev, () => this.publish(), { passive: true }));

    this.tabs[this.id] = this.snapshot();
    this.publish();
    this.broadcastFocus();
    this.ch.postMessage({ type: 'sync' });

    setInterval(() => { this.publish(); this.prune(); this.draw(); }, TICK_MS);
  }

  broadcastFocus() {
    this.ch.postMessage({ type: 'focus', id: this.focusedId });
  }

  snapshot() {
    return { x: window.screenX ?? 0, y: window.screenY ?? 0,
             w: window.outerWidth,   h: window.outerHeight, ts: Date.now() };
  }

  publish() {
    const s = this.snapshot();
    this.tabs[this.id] = s;
    this.ch.postMessage({ type: 'update', id: this.id, state: s });
  }

  prune() {
    const cutoff = Date.now() - STALE_MS;
    Object.keys(this.tabs).forEach(id => {
      if (id !== this.id && this.tabs[id].ts < cutoff) delete this.tabs[id];
    });
  }

  color(id) { return COLORS[(this.colorMap[id] ?? 0) % COLORS.length]; }
  label(id) { return id === this.id ? 'ME' : `Tab ${this.colorMap[id] ?? '?'}`; }

  // ── Render ──────────────────────────────────────────────────────────────
  draw() {
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const W = canvas.width  = canvas.offsetWidth;
    const H = canvas.height = canvas.offsetHeight;
    ctx.clearRect(0, 0, W, H);

    const ids  = Object.keys(this.tabs);
    if (!ids.length) return;

    // Screen-space → canvas-space transform
    const vals = ids.map(id => this.tabs[id]);
    const minX = Math.min(...vals.map(t => t.x));
    const minY = Math.min(...vals.map(t => t.y));
    const maxX = Math.max(...vals.map(t => t.x + t.w));
    const maxY = Math.max(...vals.map(t => t.y + t.h));
    const sx   = (W - PAD * 2) / Math.max(maxX - minX, 800);
    const sy   = (H - PAD * 2) / Math.max(maxY - minY, 600);
    const toC  = (x, y) => ({ x: PAD + (x - minX) * sx, y: PAD + (y - minY) * sy });

    // Precompute canvas rects + centers
    const rects   = {};
    const centers = {};
    ids.forEach(id => {
      const t  = this.tabs[id];
      const tl = toC(t.x,       t.y);
      const br = toC(t.x + t.w, t.y + t.h);
      rects[id]   = { x: tl.x, y: tl.y, w: br.x - tl.x, h: br.y - tl.y };
      centers[id] = { x: (tl.x + br.x) / 2, y: (tl.y + br.y) / 2 };
    });

    const myId      = this.id;
    const focusedId = this.focusedId in this.tabs ? this.focusedId : ids[0];
    const hub       = centers[focusedId];

    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth   = 1;
    const step = Math.min(W, H) / 10;
    for (let x = 0; x < W; x += step) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
    for (let y = 0; y < H; y += step) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

    // Connection lines (focused tab → every other tab)
    if (hub) {
      ids.forEach(id => {
        if (id === focusedId) return;
        const c   = centers[id];
        const col = this.color(id);
        const g   = ctx.createLinearGradient(hub.x, hub.y, c.x, c.y);
        g.addColorStop(0, rgba(this.color(focusedId), .5));
        g.addColorStop(1, rgba(col, .5));

        ctx.beginPath();
        ctx.moveTo(hub.x, hub.y);
        ctx.lineTo(c.x, c.y);
        ctx.strokeStyle = g;
        ctx.lineWidth   = 1.5;
        ctx.setLineDash([]);
        ctx.stroke();

        // Midpoint tick
        const mx  = (hub.x + c.x) / 2, my = (hub.y + c.y) / 2;
        const dx  = c.x - hub.x,        dy = c.y - hub.y;
        const len = Math.hypot(dx, dy) || 1;
        const px  = -dy / len * 6,      py = dx / len * 6;
        ctx.beginPath();
        ctx.moveTo(mx - px, my - py);
        ctx.lineTo(mx + px, my + py);
        ctx.strokeStyle = rgba(col, .35);
        ctx.lineWidth   = 1;
        ctx.stroke();
      });
    }

    // Tab rectangles
    ids.forEach(id => {
      const r         = rects[id];
      const col       = this.color(id);
      const isFocused = id === focusedId;
      const isMe      = id === myId;

      ctx.fillStyle   = rgba(col, isFocused ? .09 : .04);
      ctx.strokeStyle = rgba(col, isFocused ? .7  : .3);
      ctx.lineWidth   = isFocused ? 1.5 : 1;
      ctx.setLineDash(isFocused ? [] : [4, 3]);
      rrect(ctx, r.x, r.y, r.w, r.h, 6);
      ctx.fill(); ctx.stroke();
      ctx.setLineDash([]);

      // Label badge
      const label = this.label(id) + (isMe ? ' (you)' : '');
      ctx.font     = '500 10px JetBrains Mono, monospace';
      const bw     = ctx.measureText(label).width + 10;
      const bh     = 18;
      ctx.fillStyle = rgba(col, .85);
      rrect(ctx, r.x + 6, r.y + 6, bw, bh, 4);
      ctx.fill();
      ctx.fillStyle    = '#fff';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, r.x + 11, r.y + 6 + bh / 2);

      // Size text
      const t = this.tabs[id];
      ctx.fillStyle    = rgba(col, .55);
      ctx.font         = '400 9px JetBrains Mono, monospace';
      ctx.textAlign    = 'right';
      ctx.textBaseline = 'bottom';
      ctx.fillText(`${t.w}×${t.h}`, r.x + r.w - 6, r.y + r.h - 5);
      ctx.textAlign = 'left';
    });

    // Center dots
    ids.forEach(id => {
      const c         = centers[id];
      const col       = this.color(id);
      const isFocused = id === focusedId;

      if (isFocused) {
        ctx.beginPath();
        ctx.arc(c.x, c.y, 14, 0, TAU);
        ctx.fillStyle = rgba(col, .1);
        ctx.fill();
      }

      ctx.beginPath();
      ctx.arc(c.x, c.y, isFocused ? 9 : 7, 0, TAU);
      ctx.strokeStyle = rgba(col, .4);
      ctx.lineWidth   = isFocused ? 1.5 : 1;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(c.x, c.y, isFocused ? 5 : 4, 0, TAU);
      ctx.fillStyle = col;
      ctx.fill();
    });

    // Sidebar
    document.getElementById('count').textContent = ids.length;
    document.getElementById('ts').textContent    = new Date().toTimeString().slice(0, 8);

    document.getElementById('tab-list').innerHTML = ids.map(id => {
      const t         = this.tabs[id];
      const isMe      = id === myId;
      const isFocused = id === focusedId;
      const col       = this.color(id);
      const suffix    = isMe ? ' (you)' : isFocused ? ' (focused)' : '';
      return `<div class="tab-row${isMe ? ' is-me' : ''}${isFocused && !isMe ? ' is-focused' : ''}">
        <div class="tab-row-head">
          <div class="dot" style="background:${col};box-shadow:0 0 5px ${col}80"></div>
          <span class="tab-name">${this.label(id)}${suffix}</span>
        </div>
        <div class="tab-meta">
          pos (${t.x}, ${t.y}) &nbsp;${t.w}×${t.h}<br>
          center (${Math.round(t.x + t.w/2)}, ${Math.round(t.y + t.h/2)})
        </div>
      </div>`;
    }).join('');
  }
}

// ── Canvas resize ─────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
window.addEventListener('resize', () => {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
});

new TabTracker();
</script>
</body>
</html>
